<section>
  <div class="wrap">
    <div class="kicker">try the probe</div>
    <h2>Move your cursor. Read the scene.</h2>
    <div class="demo">
      <div class="head"><span><b>real depth</b> · a canal shot, measured by the shipping engine</span><span>hover to probe · slider adds fog</span></div>
      <div style="position:relative">
        <canvas id="dpView" style="cursor:crosshair"></canvas>
      </div>
      <div class="row">
        <label>fog <input type="range" id="dpFog" min="0" max="100" value="0"></label>
        <span class="readout" style="padding:0">
          <span>depth under cursor: <b id="dpVal">—</b></span>
          <span id="dpNear"></span>
        </span>
      </div>
      <div class="readout"><span class="live">● fog is depth-shaped: the canal houses mist first, the foreground stays clear — this is the Fog template from the pack, in your browser</span></div>
    </div>
  </div>
</section>
<script>
(function () {
  var GRID = {{ asset_text('depth-grid.json') }};
  var img = new Image(); img.src = "{{ b64('depth-frame.jpg') }}";
  var c = document.getElementById('dpView'), g = c.getContext('2d');
  var fog = document.getElementById('dpFog'), val = document.getElementById('dpVal');
  var near = document.getElementById('dpNear');
  var mouse = null;
  // depth grid -> offscreen fog alpha layer (white where near value is low = far)
  var off = document.createElement('canvas'); off.width = GRID.w; off.height = GRID.h;
  var octx = off.getContext('2d');
  function paintFog(amount) {
    var id = octx.createImageData(GRID.w, GRID.h);
    for (var i = 0; i < GRID.d.length; i++) {
      var far = 1 - GRID.d[i];           // grid stores near=1
      id.data[i * 4] = 236; id.data[i * 4 + 1] = 240; id.data[i * 4 + 2] = 244;
      id.data[i * 4 + 3] = Math.round(255 * Math.min(1, far * far * amount * 1.6));
    }
    octx.putImageData(id, 0, 0);
  }
  function draw() {
    if (!img.complete) return;
    c.width = c.clientWidth * 2; c.height = c.width * GRID.h / GRID.w;
    g.imageSmoothingEnabled = true;
    g.drawImage(img, 0, 0, c.width, c.height);
    var a = fog.value / 100;
    if (a > 0) { paintFog(a); g.drawImage(off, 0, 0, c.width, c.height); }
    if (mouse) {
      g.strokeStyle = '#F5F3EE'; g.lineWidth = 2;
      g.beginPath(); g.arc(mouse[0], mouse[1], 12, 0, 7); g.stroke();
      g.beginPath(); g.moveTo(mouse[0] - 20, mouse[1]); g.lineTo(mouse[0] + 20, mouse[1]);
      g.moveTo(mouse[0], mouse[1] - 20); g.lineTo(mouse[0], mouse[1] + 20); g.stroke();
    }
  }
  c.addEventListener('pointermove', function (e) {
    var r = c.getBoundingClientRect();
    var x = (e.clientX - r.left) / r.width, y = (e.clientY - r.top) / r.height;
    mouse = [x * c.width, y * c.height];
    var gx = Math.min(GRID.w - 1, Math.max(0, Math.round(x * GRID.w)));
    var gy = Math.min(GRID.h - 1, Math.max(0, Math.round(y * GRID.h)));
    var d = GRID.d[gy * GRID.w + gx];
    val.textContent = d.toFixed(2);
    near.textContent = d > .66 ? 'near — foreground' : d > .33 ? 'mid — the subject' : 'far — houses and trees';
    draw();
  });
  c.addEventListener('pointerleave', function () { mouse = null; val.textContent = '—'; near.textContent = ''; draw(); });
  fog.oninput = draw;
  img.onload = draw; addEventListener('resize', draw); draw();
})();
</script>
