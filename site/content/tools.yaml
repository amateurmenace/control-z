  tech: 'In development on Hush''s texture-reconstruction stack. Color architecture: density and split-toning
    operate in DaVinci Wide Gamut; halation and bloom in linear light; grain amplitude follows Hush''s
    clean-confidence matte so texture returns exactly where denoising worked. Ships when the look
    holds across Rec.709, P3, and HDR trims from one setting.'
