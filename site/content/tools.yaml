# The single source of truth for control-z.org — one block per tool.
# status: shipped | in-progress | proposed (proposed appears ONLY on /roadmap)

- id: hush
  name: Hush
  verbline: Hush quiets the noise.
  oneliner: Measured, transparent noise reduction — the tool free-Resolve users are missing most.
  status: shipped
  accent: '#3D5A47'
  stage: color
  audiences:
  - stations
  - journalists
  - filmmakers
  - artists
  replaces:
  - name: Resolve Studio NR palette
    price: $295
  - name: Neat Video
    price: ~$160
  platforms:
  - macOS
  - Windows
  - OpenFX · Color/Edit/Fusion pages
  links:
    github: https://github.com/amateurmenace/Hush-OpenNR
    download: https://github.com/amateurmenace/Hush-OpenNR/releases/latest
  quickstart:
  - Drop Hush Open NR on a node and click Auto Setup — it measures the clip and dials in every slider.
  - 'Check the measurement: Step 1 → Scope: Measurements.'
  - 'Check what''s being removed: Step 5 → View → Noise Removed. Featureless static = good.'
  - Set View back to Result. Done.
  shows_its_work: Live noise measurements, per-stage scopes, a Noise Removed view, and a clean-confidence
    matte out — Resolve's own NR is a black box; Hush shows every move.
  limitations:
  - No motion-compensated temporal NR — Studio keeps an edge on fast pans.
  - 'Classical (NLM), not AI: very competitive at normal noise, less magical on starlight footage.'
  models: []
  features:
  - Auto Setup measures the clip and writes every slider — one undo reverts it all
  - Motion-tracked temporal NR (~±8 px) with a hard anti-ghosting knee
  - 'Noise EQ cuts noise by size: fine grain, clumps, stains, color blotches'
  - Live scopes and a Noise Removed view — watch exactly what's being taken
  - Exports a clean-confidence matte Speak (and your grade) can key on
  tech: 'Three noise estimators run per frame (temporal difference, fine and coarse Laplacian) into
    robust histograms, producing separate spatial and temporal sigmas plus a 16-band brightness gain
    curve. The temporal stage compares 3×3 patches against up to ±3 frames with a hierarchical ±8
    px motion search; a hard-knee gate reaches exactly zero past the knee, so mismatches cannot ghost
    by construction. Spatial cleanup is noise-adaptive NLM with a size-banded Noise EQ, bounded by
    Detail Rescue. The refine stack (v3.6) rebuilds optical character: coring, acutance, chroma-speckle,
    and film-matched grain. GPU kernels (Metal/CUDA/OpenCL) are line-by-line ports of one CPU reference,
    held to ~2×10⁻⁵ agreement by a parity test suite.'
- id: pivot
  name: Pivot
  verbline: Pivot follows the subject.
  oneliner: Auto-reframe your 16:9 masters to 9:16, 1:1, 4:5 — with an editor's eye, not a cropping
    algorithm's.
  status: in-progress
  accent: '#5B7A9E'
  stage: deliver
  audiences:
  - stations
  - journalists
  - filmmakers
  replaces:
  - name: Studio Smart Reframe
    price: $295
  - name: auto-clip SaaS tools
    price: $15+/mo
  platforms:
  - macOS
  - Windows
  - standalone + CLI
  - Fusion .setting export
  quickstart:
  - Open a clip, pick your aspects, hit Analyze — shots, faces, and a solved camera path.
  - Scrub the path trace; override any shot to punch / follow / center.
  - Render natively (no silent upscale) or export a keyframed .setting for the Fusion page.
  shows_its_work: The path trace draws every detection, the chosen subject, and each camera move —
    plus a per-shot report of what it did and why.
  limitations:
  - Faces and people only so far — sports and wildlife will miss (saliency model on the roadmap).
  - Punch-ins past native resolution are honest resampling until you enable the Rise engine.
  models:
  - name: YuNet face detection
    license: MIT (OpenCV Zoo)
    size: 0.2 MB
  - name: YOLOX-s person detection
    license: Apache-2.0 (Megvii)
    size: 34 MB
  features:
  - 'Shot-aware subject tracking: faces first, whole people as fallback'
  - 'An editor''s camera: deadzone hold, eased jerk-limited moves, no drift'
  - Path-trace view shows every detection and every camera decision
  - 'Per-shot overrides: punch, follow, or center — re-solved instantly'
  - Renders natively or exports keyframed Fusion .setting for free Resolve
  tech: 'Analysis decodes once at 360p: shot detection (adaptive luma-diff), YuNet face detection
    every 2nd frame, YOLOX-s persons only where faces are absent, greedy IoU/distance tracking. Per
    shot, a subject is selected (size × centrality × persistence) and solved: shots under 2 s or under
    the motion floor become static punches at a trimmed median; the rest get the follow controller
    — deadzone with hysteresis, 12-frame lookahead anticipation, braking-parabola velocity setpoint
    clamped by v-max/a-max. Overshoot is pinned ≤ 4 acceleration quanta by golden tests. Renders are
    frame-accurate (EOF flush handled) with audio stream-copied, never re-encoded.'
