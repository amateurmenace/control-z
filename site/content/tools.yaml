  - name: Descript / Rev / Simon Says
    price: $15–30/mo
  platforms:
  - macOS
  - Windows
  - standalone + CLI
  quickstart:
  - scribe-cli transcribe interview.mov --diarize
  - Import the .srt onto a subtitle track; import the marker EDL for speaker-colored timeline markers.
  - Highlight the quotes you want, export a selects EDL, conform in Resolve.
  shows_its_work: Word-level confidence shading — you proof the tinted words, not the whole transcript.
    Timecode math is printed with every export.
  limitations:
  - Crosstalk and heavy accents still beat it — a human captioner is the accessibility gold standard.
  - Diarization confuses similar voices in roomy recordings.
  - Post only — live captions are community-captioner's job.
  models:
  - name: Whisper large-v3-turbo (faster-whisper)
    license: MIT (OpenAI weights)
    size: 1.6 GB
  - name: pyannote segmentation 3.0
    license: MIT
    size: 6 MB
  - name: 3D-Speaker embeddings
    license: Apache-2.0
    size: 40 MB
  features:
  - Whisper-class local transcription with word-accurate timestamps
  - Speaker diarization with editable names, colored across all exports
  - 'Broadcast-legal captions: SRT/VTT with line-length and CPS presets'
  - Marker EDL puts speaker-colored markers on your Resolve timeline
  - 'Paper edits: select text, export a CMX3600 selects EDL, conform'
  tech: 'faster-whisper (CTranslate2 int8) with Silero VAD and word timestamps; diarization via sherpa-onnx
    (pyannote segmentation 3.0 + 3D-Speaker embeddings, clustered), majority-overlap assigned per
    segment. Exports are pure, golden-tested writers: SRT/VTT with word-timed re-blocking to caption
    presets, speaker-colored marker EDLs (Resolve''s Timeline Markers From EDL), and CMX3600 selects
    EDLs with accumulating record TC and handles. NDF timecode throughout, 23.976 drift documented
    rather than hidden.'
- id: clear
  name: Clear
  verbline: Clear rescues the voice.
  oneliner: Voice isolation, de-hum, de-click, room-tone matching, and loudness to spec — the RX-shaped
    hole in every community edit.
  status: in-progress
  accent: '#4A8C7E'
  stage: sound
  audiences:
  - stations
  - journalists
  - filmmakers
  replaces:
  - name: Studio Voice Isolation
    price: $295
  - name: iZotope RX
    price: $400–1,200
  platforms:
  - macOS
  - Windows
  - standalone + CLI
  - VST3 planned
  quickstart:
  - clear-cli process interview.wav --isolate 0.65 --loudness broadcast
  - Auto-detects mains hum (50/60 Hz + harmonics) and notches it.
  - clear-cli roomtone interview.wav → 30 seconds of matching room tone for your gap fills.
  shows_its_work: One button plays what was removed. If you hear words in the residual, you're over-processing
    — the tool teaches honest gain-staging.
  limitations:
  - Full-wet isolation sounds processed — the default keeps 35% of the room, on purpose.
  - No spectral repair painting (a cough under a word is still RX territory).
  - 'Loudness normalize won''t limit: if your peaks argue with the target, it says so instead of squashing.'
  models:
  - name: DeepFilterNet 3 (official binary)
    license: MIT/Apache dual
    size: 60 MB
  features:
  - DeepFilterNet 3 voice isolation with an honest mix-back default (35% room)
  - 'Auto de-hum: finds 50/60 Hz and notches the whole harmonic series'
  - Second-difference de-click that refuses to eat sibilants
  - Room-tone synthesis from a 2-second profile — endless matching tone
  - Loudness to broadcast/podcast/streaming spec, with true-peak honesty
  tech: Isolation runs the official DeepFilterNet 3 binary as a subprocess (48 kHz, real-time class)
    with our mix-back blend. De-hum detects the mains fundamental by harmonic-sum test against the
    spectral floor, then zero-phase notch cascades. De-click flags second-difference outliers (no
    IIR ringing), interpolates runs ≤ 2 ms, and bails honestly if more than 1% of samples flag. Room
    tone is random-phase resynthesis of a Welch PSD profile — exact spectral envelope, loop-safe tail.
    Loudness is BS.1770 via pyloudnorm; if the true-peak ceiling fights the target, it says so instead
    of limiting.
- id: rise
  name: Rise
  verbline: Rise restores the detail.
  oneliner: SD→HD/4K reconstruction for tape-era archives and punch-in rescue — with a heatmap of
    what it invented.
  status: in-progress
  accent: '#C99A3A'
  stage: restore
  audiences:
  - stations
  - filmmakers
  - artists
  replaces:
  - name: Studio Super Scale
    price: $295
  - name: Topaz Video AI
    price: ~$300
  platforms:
  - macOS
  - Windows
  - standalone + CLI
  - engine inside Pivot
  quickstart:
  - rise-cli probe tape.mov — interlace check first (combs + AI = garbage, we refuse politely).
  - rise-cli up tape.mov --scale 2 --stabilize
  - 'In Pivot: tick ''enhance punch-ins'' and crops route through the same engine.'
  shows_its_work: Every render reports which backend actually ran — synthesized texture is labeled
    synthesis, never 'recovered detail.' The A/B wipe and detail heatmap show you exactly what was
    made up.
  limitations:
  - Per-frame model + temporal stabilization ≠ Topaz's temporal models on fast motion.
  - Faces can go uncanny; face restore is opt-in and off by default for journalism.
  models:
  - name: Real-ESRGAN x4 (our ONNX export)
    license: BSD-3 (xinntao)
    size: 64 MB
  features:
  - Real-ESRGAN reconstruction, tiled and seam-free at any resolution
  - Flow-gated temporal stabilization kills per-frame shimmer
  - Interlace guard refuses combed sources instead of sharpening the combs
  - 'Detail heatmap + A/B wipe: see exactly what was synthesized'
  - The same engine powers Pivot's punch-in enhancement
  tech: Official Real-ESRGAN x4plus weights converted to a pinned ONNX (the conversion script ships),
    run through ONNX Runtime (CoreML/DirectML/CUDA) with 512 px tiles and ramped overlap blending
    — golden-tested seam-free vs whole-frame. Temporal stabilization warps the previous output by
    Farneback flow and blends where warp error is low. The engine is a frozen API consumed by both
    the app and Pivot; every result carries which backend actually ran, and synthesis is always labeled
    synthesis.
- id: depth
  name: Depth
  verbline: Depth measures the scene.
  oneliner: A depth matte for every clip — fog, rack focus, and depth-graded atmosphere through a
    paste-in Fusion template pack.
  status: in-progress
  accent: '#5E5A8C'
  stage: color
  audiences:
  - filmmakers
  - artists
  replaces:
  - name: Studio Depth Map + Relight
    price: $295
  platforms:
  - macOS
  - Windows
  - standalone + CLI
  - Fusion templates
  quickstart:
  - depth-cli run scene.mov → a 10-bit gray depth matte clip beside your footage.
  - 'depth-cli templates → five paste-ready Fusion setups: Fog, Rack Focus, Depth Grade, Parallax
    2.5D, Haze Light.'
  - 'Color page: Add Matte, key through the depth bands.'
  shows_its_work: False-color previews with a click-anywhere probe, per-shot range readouts, and a
    temporal-stability meter that flags flicker before you grade.
  limitations:
  - Relative depth, not metric — mattes and atmosphere, not measurement.
  - Mirrors, glass, and scale tricks fool it.
  - v0.1 backend is per-frame with temporal smoothing; the video-native model is planned.
  models:
  - name: MiDaS-small
    license: MIT (Intel ISL)
    size: 64 MB
  features:
  - A relative depth matte for every clip, temporally smoothed per shot
  - Edge-guided upsampling keeps depth edges locked to image edges
  - 10-bit gray ProRes mattes the Color page keys through directly
  - 'Five paste-in Fusion templates: fog, rack focus, depth grade, parallax, haze'
  - False-color probe view with per-shot range readouts
  tech: MiDaS-small (256 px, MIT) behind a model-agnostic engine — Video-Depth-Anything-Small is the
    planned v0.2 backend. Temporal EMA resets at every cut; per-shot normalization uses 2/98 percentiles
    so hot pixels can't crush the range. Upsampling is a He-style guided filter against the source
    luma, keeping depth edges on image edges. Export packs 0–1 depth into 10-bit gray ProRes 4444
    (near = white by default, invertible, gamma-mappable).
