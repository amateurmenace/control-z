    price: ~$700
  platforms:
  - macOS
  - Windows
  - standalone + CLI
  quickstart:
  - 'Point at the thing: one include click (add excludes if needed).'
  - Propagate — SAM 2.1 tracks it across the shot on your GPU.
  - Export a luma matte (Color page → Add Matte) or ProRes 4444 with alpha.
  shows_its_work: The confidence timeline glows amber on every frame the model is unsure about — you
    QC the minutes that need it, not the hour that doesn't.
  limitations:
  - Soft-matte quality on hair and motion blur — it's a roto assistant, not a keyer.
  - Heavyweight install (PyTorch) until the ONNX port lands.
  - 'Prompt granularity is real: click a face, get a face; click a jacket, get a jacket.'
  models:
  - name: SAM 2.1 hiera-small
    license: Apache-2.0 (Meta)
    size: 176 MB
  features:
  - One click on any frame propagates a matte across the whole shot (SAM 2.1)
  - Confidence timeline glows amber exactly where the model is unsure
  - Corrective clicks re-propagate — QC the minutes that need it
  - Grow / feather / de-flicker post chain, tuned for grading mattes
  - Exports luma mattes and ProRes 4444 alpha that free Resolve just uses
  tech: 'SAM 2.1 hiera-small propagates prompted masklets bidirectionally through a shot at 720p analysis
    resolution (PyTorch on Metal/CUDA; ONNX port planned). Confidence per frame is the model''s mean
    in-mask probability — the amber QC strip. Post chain: 3-frame morphological majority (de-flicker),
    despeckle, grow/shrink, gaussian feather; mattes upsample to source res on export. Shot-bounded
    by the shared cut detector so propagation never crosses an edit.'
- id: scribe
  name: Scribe
  verbline: Scribe writes it all down.
  oneliner: 'Local transcription with speakers, captions, and the paper-edit superpower: select text,
    get a cut timeline back.'
  status: in-progress
  accent: '#52678C'
  stage: edit
