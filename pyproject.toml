[project]
name = "control-z-apps"
version = "0.1.0"
description = "control-z: free finishing tools for DaVinci Resolve (standalone apps monorepo)"
license = { text = "MIT" }
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
pivot = ["numpy", "av", "opencv-python"]
ui = ["fastapi", "uvicorn", "pywebview"]
dev = []

[project.scripts]
pivot-cli = "pivot.cli:main"
stencil-cli = "stencil.cli:main"
scribe-cli = "scribe.cli:main"
clear-cli = "clear.cli:main"
rise-cli = "rise.cli:main"
depth-cli = "depth.cli:main"

[tool.setuptools]
packages = ["czcore", "czcore.exports", "czcore.appshell",
            "pivot", "stencil", "scribe", "clear", "rise", "depth"]

[tool.setuptools.package-data]
pivot = ["static/*.html"]
depth = ["templates/*.setting"]
